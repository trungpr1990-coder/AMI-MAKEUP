name: Đăng video YouTube từ Lark Base

# Chạy TỰ ĐỘNG theo lịch (cron 5') để đăng video tới giờ hẹn, VÀ chạy tay từ tab Actions.
# Repo public -> GitHub Actions miễn phí không giới hạn phút, nên quét ở mức nhanh nhất GitHub cho phép (5').
on:
  schedule:
    - cron: '*/5 * * * *'   # mỗi 5 phút quét bảng "Đăng YouTube", đăng dòng đã tới "Ngày giờ đăng"
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Chỉ liệt kê, KHÔNG đăng (kiểm tra trước)'
        type: boolean
        default: false
      record_id:
        description: 'Chỉ đăng đúng 1 dòng (record_id) — bỏ qua lịch/trạng thái'
        type: string
        default: ''

concurrency:
  group: dang-video-youtube
  cancel-in-progress: false

jobs:
  dang-video:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ghi credentials YouTube từ GitHub Secrets
        working-directory: automation/youtube-autopost
        run: |
          mkdir -p .secrets
          printf '%s' "$GOOGLE_CLIENT_SECRET_JSON" > .secrets/client_secret.json
          printf '%s' "$YOUTUBE_TOKEN_JSON" > .secrets/youtube-token.json
        env:
          GOOGLE_CLIENT_SECRET_JSON: ${{ secrets.GOOGLE_CLIENT_SECRET_JSON }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}

      - name: AI viết Tiêu đề từ video (nếu còn trống)
        working-directory: automation/youtube-autopost
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          YT_BASE_TOKEN: ${{ secrets.YT_BASE_TOKEN }}
          YT_TABLE_ID: ${{ secrets.YT_TABLE_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node viet-tieu-de-ai.js

      - name: Quét Lark Base và đăng video đến hạn
        working-directory: automation/youtube-autopost
        env:
          LARK_APP_ID: ${{ secrets.LARK_APP_ID }}
          LARK_APP_SECRET: ${{ secrets.LARK_APP_SECRET }}
          YT_BASE_TOKEN: ${{ secrets.YT_BASE_TOKEN }}
          YT_TABLE_ID: ${{ secrets.YT_TABLE_ID }}
          RECORD_ID: ${{ inputs.record_id }}
          SCHEDULE_MODE: ${{ github.event_name == 'schedule' }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="--dry-run"; fi
          echo "Chạy: node scan-and-post.js $ARGS  (SCHEDULE_MODE=$SCHEDULE_MODE)"
          node scan-and-post.js $ARGS
